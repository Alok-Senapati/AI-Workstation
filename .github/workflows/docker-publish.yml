name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
    paths:
      - .github/workflows/docker-publish.yml
      - .github/workflows/docker-verify.yml
      - Makefile
      - docker/**
      - scripts/ci/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reclaim runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker images
        run: bash scripts/ci/build-images.sh

      - name: Verify Docker images
        run: bash scripts/ci/verify-images.sh

      - name: Publish Docker images
        env:
          IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}
        run: bash scripts/ci/publish-images.sh
